name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          echo "=== 检查打包后到底生成了什么文件夹 ==="
          ls -la  # ✨ 这一行能让你在 Actions 日志里亲眼看到到底有没有生成 dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 确保路径写成相对路径 './dist'
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
